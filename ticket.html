<html lang="ja">

    <style>
        :root {
            --gold: #dfc17b;
            --gold-light: #fef1cf;
            --gold-dark: #b88d3a;
            --bg-dark: #020205;
            --bg-card: rgba(255, 255, 255, 0.03);
            /* Extreme Glassmorphism */
            --bg-input: rgba(0, 0, 0, 0.3);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --accent: #6366f1;
            --accent2: #a855f7;
            --error: #ff4d4d;
            --success: #34d399;
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-reflection: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;

            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px 48px;
            letter-spacing: 0.03em;
            position: relative;
        }

        /* Updated High-End Aurora - Brighter & More Dynamic */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 15% 15%, #4338ca 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, #6d28d9 0%, transparent 40%),
                radial-gradient(circle at 15% 85%, #1e40af 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, #a855f7 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #020205 0%, transparent 100%);
            animation: auroraRoate 20s linear infinite;
            z-index: -2;
            filter: blur(70px);
        }

        /* Glass Texture Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes auroraRoate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-family: 'Outfit', 'Shippori Mincho', serif;
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
            font-feature-settings: "palt" 1;
            filter: drop-shadow(0 0 10px rgba(223, 193, 123, 0.3));
        }

        .header p {
            color: var(--text-sub);
            font-size: 0.85rem;

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);

            gap: 12px;

    <script>
        // ============================================================
        // QR SVG generator (same technique as admin.html)
        // ============================================================
        function makeQRSVG(text, size) {
            size = size || 200;
            return new Promise(function (resolve) {
                var tmp = document.createElement('div');
                tmp.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
                document.body.appendChild(tmp);
                try {
                    new QRCode(tmp, { text: text, width: size, height: size, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
                    setTimeout(function () {
                        var canvas = tmp.querySelector('canvas');
                        var img = tmp.querySelector('img');
                        var table = tmp.querySelector('table');
                        var svg = null;
                        if (canvas && canvas.width > 0) {
                            var d = canvas.toDataURL('image/png');
                            svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '"><image href="' + d + '" width="' + size + '" height="' + size + '"/></svg>';
                        } else if (img && img.src && img.src.startsWith('data:')) {
                            svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '"><image href="' + img.src + '" width="' + size + '" height="' + size + '"/></svg>';
                        } else if (table) {
                            var rows = table.querySelectorAll('tr');
                            var n = rows.length;
                            var cell = size / n;
                            var parts = ['<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" shape-rendering="crispEdges"><rect width="' + size + '" height="' + size + '" fill="#fff"/>'];
                            for (var r = 0; r < rows.length; r++) {
                                var cells = rows[r].querySelectorAll('td');
                                for (var c = 0; c < cells.length; c++) {
                                    var bg = cells[c].style.backgroundColor;
                                    if (bg && bg !== 'rgb(255, 255, 255)' && bg !== '#ffffff' && bg !== 'white') {
                                        parts.push('<rect x="' + (c * cell).toFixed(1) + '" y="' + (r * cell).toFixed(1) + '" width="' + cell.toFixed(1) + '" height="' + cell.toFixed(1) + '" fill="#000"/>');
                                    }
                                }
                            }
                            parts.push('</svg>');
                            svg = parts.join('');
                        }
                        document.body.removeChild(tmp);
                        resolve(svg);
                    }, 400);
                } catch (e) {
                    document.body.removeChild(tmp);
                    resolve(null);
                }
            });
        }

    </script>

            </div>
            <div style="flex:1;">
                <div class="tile-label">Exclusive Concert Invitation</div>
                <div class="tile-val tile-val-lg" style="margin-bottom:12px;">${esc(concertName)}</div>
                
                <div class="concert-info-grid">
                    <div class="info-item"><span class="icon">📅</span>${esc(concertDate)}</div>
                    <div class="info-item"><span class="icon">🕐</span>${esc(concertTime)}</div>
                    <div class="info-item" style="grid-column: span 2;"><span class="icon">📍</span>${esc(concertVenue)}</div>
                </div>
            </div>
        </div>
      </div>

      <!-- Row 2: Header (2/3) + Count (1/3) -->
      <div class="tile tile-2">
        <div class="tile-label">Ticket Holder / お名前</div>
        <div class="tile-val">${esc(reg.name)}</div>
        <div style="font-size:0.75rem; color:var(--text-sub); margin-top:4px; font-weight:400; font-feature-settings:'palt' 1;">${esc(reg.furigana || '')}</div>
      </div>
      <div class="tile tile-1" style="text-align:center; align-items:center;">
        <div class="tile-label">Count</div>
        <div class="tile-val" style="white-space:nowrap;">${reg.count} <span style="font-size:0.75rem; font-weight:400;">名</span></div>
      </div>

      <!-- Row 3: QR (Full) -->
      <div class="tile tile-3" style="text-align:center; align-items:center; background: rgba(0,0,0,0.25);">
        <div class="tile-label">Entrance QR Code</div>
        <div class="qr-render-box" id="qrRenderBox" style="margin: 12px 0;">
          <div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;">生成中...</div>
        </div>
        <div class="tid-text" style="font-size:0.65rem;">TICKET ID: ${esc(tid)}</div>
      </div>

      <!-- Row 4: Status (1/3) + Registered Date (2/3) -->
      <div class="tile tile-1" style="align-items:center;">
        <div class="tile-label">Status</div>
        ${statusHTML}
      </div>
      <div class="tile tile-2">
        <div class="tile-label">Registration Snapshot</div>
        <div style="font-size:0.8rem; color:#fff; font-weight:600;">${formatDate(reg.registeredAt)}</div>
      </div>

      <div class="tile tile-3" style="background:transparent; border:none; box-shadow:none; padding:10px; text-align:center; filter:none;">
        <div style="font-size:0.7rem; color:var(--text-sub); line-height:1.6; opacity:0.8;">
          ※入場時にスタッフへ提示してください。画像を保存しておくと安心です。
        </div>
      </div>
    </div>`;

            // Generate QR
            const qrData = tid;
            const svg = await makeQRSVG(qrData, 200);
            const box = document.getElementById('qrRenderBox');
            if (svg) {
                box.innerHTML = svg;
            } else {
                box.innerHTML = '<div style="width:200px;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#666;text-align:center;padding:12px;"><div style="font-size:24px;margin-bottom:8px;">⚠️</div>QR生成に失敗<br><small style="margin-top:4px;">チケットIDをスタッフに見せてください</small></div>';
            }

            actWrap.style.display = 'flex';
            actWrap.innerHTML = `
    <button class="btn btn-save" onclick="location.href='index.html?tid=${tid}&mode=edit'">✏️ 登録内容を修正する</button>
    <button class="btn btn-share" onclick="window.print()">🖨️ 印刷 / PDF保存</button>`;
        });

        function renderNotFound(wrap, msg) {
            wrap.innerHTML = `<div class="not-found"><div class="icon">❌</div><h2>チケットが見つかりません</h2><p>${msg}</p><a href="index.html" class="btn-back">← 登録ページへ戻る</a></div>`;
        }

        function saveTicket() {
            alert('このページをスクリーンショットで保存してください。\nスマートフォン：ホームボタン＋電源ボタン（または音量アップ＋電源ボタン）');
        }

        async function shareTicket() {
            if (navigator.share) {
                try { await navigator.share({ title: '定期演奏会チケット', text: 'コンサートのチケットです', url: location.href }); } catch { }
            } else {
                try { await navigator.clipboard.writeText(location.href); alert('チケットのURLをコピーしました'); }
                catch { alert('URLをコピーしてください：\n' + location.href); }
            }
        }
    </script>
</body>

</html>
